# fly.toml app configuration file generated for masklm-api on 2026-04-19T00:10:57-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'masklm-api'
primary_region = 'sjc'

[build]

[env]
  ALLOWED_ORIGINS = 'http://localhost:5173,http://localhost:3000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
